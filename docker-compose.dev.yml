# ==============================================================================
# Development Docker Compose Configuration
# ==============================================================================

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: social_impact_backend_dev
    ports:
      - "8000:8000"
    volumes:
      # Mount application code for live reloading
      - ./backend:/app
    env_file:
      - .env
    environment:
      - ENV=development
      - FRONTEND_URL=http://localhost:5173
    networks:
      - social_impact_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: social_impact_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source code for Hot Module Replacement (HMR)
      - ./frontend:/app
      # Anonymous volume for node_modules to avoid host OS platform mismatches
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - social_impact_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  social_impact_network:
    driver: bridge
    name: social_impact_network_dev

volumes:
  # Named volume for node modules
  frontend_node_modules:
