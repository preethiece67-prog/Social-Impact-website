# ==============================================================================
# Production Docker Compose Configuration
# ==============================================================================

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: social_impact_backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=production
      - FRONTEND_URL=https://your-production-domain.com
    networks:
      - social_impact_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      target: production
      # Build args injected at build time for React/Vite
      args:
        - VITE_API_URL=https://api.your-production-domain.com
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: social_impact_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - social_impact_network
    depends_on:
      backend:
         condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  social_impact_network:
    driver: bridge
    name: social_impact_network_prod
